<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸飞机 BATTLEPLANES | 雷达控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --radar-green: #00ff41;
            --radar-dim: #00aa2b;
            --radar-dark: #003d14;
            --radar-bg: #001a0d;
            --hit-yellow: #ffcc00;
            --kill-red: #ff3333;
            --miss-gray: #445544;
            --glow: 0 0 10px var(--radar-green), 0 0 20px var(--radar-green);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: var(--radar-green);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        /* CRT 扫描线效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: flicker 0.15s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 0.95; }
            50% { opacity: 1; }
        }
        
        /* 雷达扫描动画 */
        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0; }
        }
        
        .container {
            display: flex;
            height: 100vh;
            background: radial-gradient(ellipse at center, var(--radar-bg) 0%, #000 100%);
            padding: 20px;
            gap: 20px;
        }
        
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 30px;
            background: rgba(0, 26, 13, 0.9);
            border-bottom: 2px solid var(--radar-green);
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.3);
            z-index: 100;
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: var(--glow);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-status {
            font-size: 12px;
            color: var(--radar-dim);
            margin-top: 5px;
            letter-spacing: 2px;
        }
        
        .game-area {
            flex: 1;
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            margin-top: 80px;
        }
        
        .grid-container {
            position: relative;
        }
        
        .grid-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: var(--glow);
            padding: 8px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--radar-dim);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(11, 35px);
            grid-template-rows: repeat(11, 35px);
            gap: 1px;
            background: var(--radar-dark);
            padding: 2px;
            border: 3px solid var(--radar-green);
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 65, 0.2),
                0 0 30px rgba(0, 255, 65, 0.3);
            position: relative;
        }
        
        .cell {
            background: var(--radar-bg);
            border: 1px solid var(--radar-dark);
            position: relative;
            transition: all 0.2s ease;
            cursor: crosshair;
        }
        
        .cell:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: inset 0 0 10px var(--radar-green);
        }
        
        .cell.disabled {
            cursor: not-allowed;
        }
        
        .cell.disabled:hover {
            background: var(--radar-bg);
            box-shadow: none;
        }
        
        /* 玩家网格在手动部署时的样式 */
        #playerGrid.manual-mode .cell {
            cursor: pointer;
        }
        
        #playerGrid.manual-mode .cell:hover {
            background: rgba(0, 255, 65, 0.15);
        }
        
        #playerGrid:not(.manual-mode) .cell {
            cursor: default;
        }
        
        #playerGrid:not(.manual-mode) .cell:hover {
            background: var(--radar-bg);
            box-shadow: none;
        }
        
        /* 飞机部件样式 */
        .cell.plane-head {
            background: var(--kill-red);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .cell.plane-wing {
            background: var(--radar-green);
        }
        
        .cell.plane-body {
            background: var(--radar-dim);
        }
        
        .cell.plane-tail {
            background: var(--radar-green);
        }
        
        /* 预览样式 */
        .cell.preview {
            background: rgba(0, 255, 65, 0.3);
            border: 2px dashed var(--radar-green);
            animation: pulse 1s infinite;
        }
        
        .cell.preview.invalid {
            background: rgba(255, 51, 51, 0.3);
            border: 2px dashed var(--kill-red);
        }
        
        /* 攻击结果样式 */
        .cell.hit {
            background: var(--hit-yellow);
            animation: pulse 1s infinite;
            box-shadow: 0 0 20px var(--hit-yellow);
        }
        
        .cell.kill {
            background: var(--kill-red);
            animation: pulse 0.5s infinite;
            box-shadow: 0 0 30px var(--kill-red);
        }
        
        .cell.miss {
            background: var(--miss-gray);
            opacity: 0.5;
        }
        
        .cell.hit::after,
        .cell.kill::after,
        .cell.miss::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .cell.hit::after {
            background: #fff;
            box-shadow: 0 0 10px var(--hit-yellow);
        }
        
        .cell.kill::after {
            background: #fff;
            box-shadow: 0 0 15px var(--kill-red);
        }
        
        .cell.miss::after {
            background: var(--miss-gray);
        }
        
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 80px;
        }
        
        .panel {
            background: rgba(0, 26, 13, 0.8);
            border: 2px solid var(--radar-green);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--radar-dim);
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--radar-green);
        }
        
        .controls button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: transparent;
            border: 2px solid var(--radar-green);
            color: var(--radar-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .controls button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--radar-green);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .controls button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .controls button:hover {
            color: #000;
            box-shadow: 0 0 20px var(--radar-green);
        }
        
        .controls button span {
            position: relative;
            z-index: 1;
        }
        
        .controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .direction-btn {
            padding: 8px !important;
            font-size: 12px !important;
        }
        
        .direction-btn.active {
            background: var(--radar-green) !important;
            color: #000 !important;
            box-shadow: 0 0 15px var(--radar-green) !important;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        
        .status-item {
            padding: 10px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--radar-dim);
            text-align: center;
        }
        
        .status-label {
            font-size: 10px;
            color: var(--radar-dim);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .status-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 0 5px var(--radar-green);
        }
        
        .log-container {
            flex: 1;
            overflow-y: auto;
            max-height: 400px;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            background: rgba(0, 255, 65, 0.05);
            border-left: 3px solid var(--radar-dim);
            font-size: 12px;
            line-height: 1.6;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .log-entry.player {
            border-left-color: var(--radar-green);
        }
        
        .log-entry.ai {
            border-left-color: var(--kill-red);
        }
        
        .log-entry.system {
            border-left-color: var(--hit-yellow);
            background: rgba(255, 204, 0, 0.1);
        }
        
        .log-time {
            color: var(--radar-dim);
            font-size: 10px;
            margin-right: 8px;
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid var(--radar-green);
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.5);
            z-index: 2000;
            display: none;
        }
        
        .game-over.show {
            display: block;
            animation: zoomIn 0.5s ease;
        }
        
        @keyframes zoomIn {
            from {
                transform: translate(-50%, -50%) scale(0);
            }
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        .game-over h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--radar-green);
            animation: blink 1s infinite;
        }
        
        .game-over.victory h2 {
            color: var(--radar-green);
        }
        
        .game-over.defeat h2 {
            color: var(--kill-red);
            text-shadow: 0 0 20px var(--kill-red);
        }
        
        /* 自定义滚动条 */
        .log-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .log-container::-webkit-scrollbar-track {
            background: var(--radar-dark);
        }
        
        .log-container::-webkit-scrollbar-thumb {
            background: var(--radar-green);
            box-shadow: 0 0 5px var(--radar-green);
        }
        
        /* 雷达扫描线 */
        .grid::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(0, 255, 65, 0.3) 45deg,
                transparent 90deg
            );
            transform: translate(-50%, -50%);
            animation: radarSweep 4s linear infinite;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>⬡</span>
            BATTLEPLANES - 炸飞机
            <span>⬡</span>
        </h1>
        <div class="header-status">TACTICAL AIR DEFENSE SYSTEM v2.1 | STATUS: OPERATIONAL</div>
    </div>

    <div class="container">
        <div class="game-area">
            <div class="grid-container">
                <div class="grid-title">我方领空 [FRIENDLY]</div>
                <div id="playerGrid" class="grid"></div>
            </div>
            
            <div class="grid-container">
                <div class="grid-title">敌方领空 [HOSTILE]</div>
                <div id="enemyGrid" class="grid"></div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="panel controls">
                <div class="panel-title">⚡ 作战控制</div>
                <button id="manualBtn"><span>✋ 手动布阵 ✋</span></button>
                <button id="deployBtn"><span>◈ 随机布阵 ◈</span></button>
                
                <div id="manualControls" style="display: none; margin-top: 15px;">
                    <div style="margin-bottom: 10px; text-align: center; font-size: 12px; color: var(--radar-dim);">
                        已放置: <span id="placedCount">0</span> / 3
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 10px;">
                        <button class="direction-btn" data-dir="0"><span>↑ 上</span></button>
                        <button class="direction-btn" data-dir="1"><span>→ 右</span></button>
                        <button class="direction-btn" data-dir="2"><span>↓ 下</span></button>
                        <button class="direction-btn" data-dir="3"><span>← 左</span></button>
                    </div>
                    <button id="clearBtn" style="background: rgba(255, 51, 51, 0.2); border-color: var(--kill-red);"><span>🗑 清空重置</span></button>
                </div>
                
                <button id="startBtn" disabled><span>▶ 开始战斗 ▶</span></button>
                <button id="resetBtn"><span>⟲ 重置游戏 ⟲</span></button>
            </div>
            
            <div class="panel">
                <div class="panel-title">📊 战况统计</div>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">我方存活</div>
                        <div class="status-value" id="playerPlanes">3</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">敌方存活</div>
                        <div class="status-value" id="enemyPlanes">3</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">回合数</div>
                        <div class="status-value" id="turnCount">0</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">命中率</div>
                        <div class="status-value" id="accuracy">0%</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-title">📡 作战日志</div>
                <div class="log-container" id="gameLog"></div>
            </div>
        </div>
    </div>
    
    <div id="gameOverModal" class="game-over">
        <h2 id="gameOverText"></h2>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 15px 30px;">
            <span>重新开始</span>
        </button>
    </div>

    <script>
        // ========== 游戏配置 ==========
        const GameConfig = {
            gridSize: 11,
            planeCount: 3,
            aiDifficulty: 1, // 可以手动调整 AI 难度
            buffs: {} // 预留 Buff 系统
        };
        
        // ========== 飞机形状定义 ==========
        // 以机头为原点(0,0)，定义飞机各部件的相对坐标
        // 形状: H (头) / W W W W W (机翼5个) / B (机身) / T T T (机尾3个)
        // 方向: 0=上, 1=右, 2=下, 3=左
        const PlaneShapes = {
            0: [ // 机头朝上
                {x: 0, y: 0, type: 'head'},        // 机头 H
                {x: -2, y: 1, type: 'wing'},       // 机翼 W W W W W
                {x: -1, y: 1, type: 'wing'},
                {x: 0, y: 1, type: 'wing'},
                {x: 1, y: 1, type: 'wing'},
                {x: 2, y: 1, type: 'wing'},
                {x: 0, y: 2, type: 'body'},        // 机身 B
                {x: -1, y: 3, type: 'tail'},       // 机尾 T T T
                {x: 0, y: 3, type: 'tail'},
                {x: 1, y: 3, type: 'tail'}
            ],
            1: [ // 机头朝右
                {x: 0, y: 0, type: 'head'},
                {x: -1, y: -2, type: 'wing'},
                {x: -1, y: -1, type: 'wing'},
                {x: -1, y: 0, type: 'wing'},
                {x: -1, y: 1, type: 'wing'},
                {x: -1, y: 2, type: 'wing'},
                {x: -2, y: 0, type: 'body'},
                {x: -3, y: -1, type: 'tail'},
                {x: -3, y: 0, type: 'tail'},
                {x: -3, y: 1, type: 'tail'}
            ],
            2: [ // 机头朝下
                {x: 0, y: 0, type: 'head'},
                {x: -2, y: -1, type: 'wing'},
                {x: -1, y: -1, type: 'wing'},
                {x: 0, y: -1, type: 'wing'},
                {x: 1, y: -1, type: 'wing'},
                {x: 2, y: -1, type: 'wing'},
                {x: 0, y: -2, type: 'body'},
                {x: -1, y: -3, type: 'tail'},
                {x: 0, y: -3, type: 'tail'},
                {x: 1, y: -3, type: 'tail'}
            ],
            3: [ // 机头朝左
                {x: 0, y: 0, type: 'head'},
                {x: 1, y: -2, type: 'wing'},
                {x: 1, y: -1, type: 'wing'},
                {x: 1, y: 0, type: 'wing'},
                {x: 1, y: 1, type: 'wing'},
                {x: 1, y: 2, type: 'wing'},
                {x: 2, y: 0, type: 'body'},
                {x: 3, y: -1, type: 'tail'},
                {x: 3, y: 0, type: 'tail'},
                {x: 3, y: 1, type: 'tail'}
            ]
        };
        
        // ========== 游戏状态 ==========
        const GameState = {
            phase: 'setup', // setup, battle, gameover
            playerPlanes: [],
            enemyPlanes: [],
            playerAttacks: new Set(),
            enemyAttacks: new Set(),
            playerHits: 0,
            playerShots: 0,
            aiLastHit: null, // AI 上次击中的位置
            aiTargetQueue: [], // AI 的目标队列（猎杀模式）
            turn: 0,
            playerDestroyed: 0,
            enemyDestroyed: 0,
            manualDeployMode: false, // 手动部署模式
            currentDirection: 0, // 当前选择的方向
            previewPlane: null, // 预览的飞机
            placedCount: 0 // 已放置的飞机数量
        };
        
        // ========== 初始化网格 ==========
        function initGrids() {
            const playerGrid = document.getElementById('playerGrid');
            const enemyGrid = document.getElementById('enemyGrid');
            
            playerGrid.innerHTML = '';
            enemyGrid.innerHTML = '';
            
            for (let i = 0; i < GameConfig.gridSize * GameConfig.gridSize; i++) {
                const playerCell = document.createElement('div');
                playerCell.className = 'cell';
                playerCell.dataset.index = i;
                playerCell.addEventListener('mouseenter', handlePlayerGridHover);
                playerCell.addEventListener('mouseleave', clearPreview);
                playerCell.addEventListener('click', handlePlayerGridClick);
                playerGrid.appendChild(playerCell);
                
                const enemyCell = document.createElement('div');
                enemyCell.className = 'cell';
                enemyCell.dataset.index = i;
                enemyCell.addEventListener('click', handleEnemyGridClick);
                enemyGrid.appendChild(enemyCell);
            }
        }
        
        // ========== 部署飞机 ==========
        function deployPlanes(isPlayer) {
            const planes = [];
            const occupied = new Set();
            
            for (let i = 0; i < GameConfig.planeCount; i++) {
                let placed = false;
                let attempts = 0;
                
                while (!placed && attempts < 1000) {
                    attempts++;
                    const direction = Math.floor(Math.random() * 4);
                    const headX = Math.floor(Math.random() * GameConfig.gridSize);
                    const headY = Math.floor(Math.random() * GameConfig.gridSize);
                    
                    const shape = PlaneShapes[direction];
                    const positions = [];
                    let valid = true;
                    
                    for (const part of shape) {
                        const x = headX + part.x;
                        const y = headY + part.y;
                        
                        if (x < 0 || x >= GameConfig.gridSize || y < 0 || y >= GameConfig.gridSize) {
                            valid = false;
                            break;
                        }
                        
                        const index = y * GameConfig.gridSize + x;
                        if (occupied.has(index)) {
                            valid = false;
                            break;
                        }
                        
                        positions.push({x, y, index, type: part.type});
                    }
                    
                    if (valid) {
                        planes.push({
                            headX, headY, direction, positions,
                            destroyed: false,
                            hits: new Set()
                        });
                        
                        positions.forEach(pos => occupied.add(pos.index));
                        placed = true;
                    }
                }
            }
            
            return planes;
        }
        
        // ========== 手动部署：鼠标悬停预览 ==========
        function handlePlayerGridHover(e) {
            if (!GameState.manualDeployMode || GameState.placedCount >= GameConfig.planeCount) return;
            
            const index = parseInt(e.target.dataset.index);
            const x = index % GameConfig.gridSize;
            const y = Math.floor(index / GameConfig.gridSize);
            
            const shape = PlaneShapes[GameState.currentDirection];
            const positions = [];
            let valid = true;
            
            // 检查飞机是否可以放置
            for (const part of shape) {
                const px = x + part.x;
                const py = y + part.y;
                
                if (px < 0 || px >= GameConfig.gridSize || py < 0 || py >= GameConfig.gridSize) {
                    valid = false;
                    break;
                }
                
                const pIndex = py * GameConfig.gridSize + px;
                
                // 检查是否与已放置的飞机重叠
                for (const plane of GameState.playerPlanes) {
                    if (plane.positions.some(pos => pos.index === pIndex)) {
                        valid = false;
                        break;
                    }
                }
                
                if (!valid) break;
                positions.push(pIndex);
            }
            
            // 显示预览
            const grid = document.getElementById('playerGrid');
            const cells = grid.querySelectorAll('.cell');
            
            positions.forEach(pIndex => {
                const cell = cells[pIndex];
                if (valid) {
                    cell.classList.add('preview');
                } else {
                    cell.classList.add('preview', 'invalid');
                }
            });
            
            GameState.previewPlane = {positions, valid};
        }
        
        // ========== 清除预览 ==========
        function clearPreview() {
            if (!GameState.manualDeployMode) return;
            
            const grid = document.getElementById('playerGrid');
            const cells = grid.querySelectorAll('.cell');
            
            cells.forEach(cell => {
                cell.classList.remove('preview', 'invalid');
            });
            
            GameState.previewPlane = null;
        }
        
        // ========== 手动部署：点击放置飞机 ==========
        function handlePlayerGridClick(e) {
            if (!GameState.manualDeployMode || GameState.phase !== 'setup') return;
            
            const index = parseInt(e.target.dataset.index);
            
            // 检查是否点击了已放置的飞机（用于删除）
            const clickedPlaneIndex = GameState.playerPlanes.findIndex(plane => 
                plane.positions.some(pos => pos.index === index)
            );
            
            if (clickedPlaneIndex !== -1) {
                // 删除飞机
                GameState.playerPlanes.splice(clickedPlaneIndex, 1);
                GameState.placedCount--;
                renderPlayerPlanes();
                updatePlacedCount();
                addLog(`移除了飞机 #${clickedPlaneIndex + 1}（点击已放置的飞机可删除）`, 'system');
                if (GameState.placedCount < GameConfig.planeCount) {
                    document.getElementById('startBtn').disabled = true;
                }
                return;
            }
            
            // 放置新飞机
            if (GameState.placedCount >= GameConfig.planeCount) {
                addLog('已达到最大飞机数量！点击已放置的飞机可删除。', 'system');
                return;
            }
            
            if (!GameState.previewPlane || !GameState.previewPlane.valid) {
                addLog('无法在此位置放置飞机！请选择其他位置或更改方向。', 'system');
                return;
            }
            
            const x = index % GameConfig.gridSize;
            const y = Math.floor(index / GameConfig.gridSize);
            const shape = PlaneShapes[GameState.currentDirection];
            const positions = [];
            
            for (const part of shape) {
                const px = x + part.x;
                const py = y + part.y;
                const pIndex = py * GameConfig.gridSize + px;
                positions.push({x: px, y: py, index: pIndex, type: part.type});
            }
            
            GameState.playerPlanes.push({
                headX: x,
                headY: y,
                direction: GameState.currentDirection,
                positions,
                destroyed: false,
                hits: new Set()
            });
            
            GameState.placedCount++;
            renderPlayerPlanes();
            clearPreview();
            updatePlacedCount();
            
            const dirNames = ['↑', '→', '↓', '←'];
            addLog(`放置飞机 #${GameState.placedCount} 于 (${x}, ${y}) 朝向${dirNames[GameState.currentDirection]}`, 'system');
            
            if (GameState.placedCount >= GameConfig.planeCount) {
                document.getElementById('startBtn').disabled = false;
                addLog('✓ 所有飞机已部署完成！可以开始战斗。', 'system');
            }
        }
        
        // ========== 更新已放置数量显示 ==========
        function updatePlacedCount() {
            document.getElementById('placedCount').textContent = GameState.placedCount;
        }
        
        // ========== 渲染玩家飞机 ==========
        function renderPlayerPlanes() {
            const grid = document.getElementById('playerGrid');
            const cells = grid.querySelectorAll('.cell');
            
            cells.forEach(cell => {
                cell.className = 'cell';
            });
            
            GameState.playerPlanes.forEach(plane => {
                plane.positions.forEach(pos => {
                    const cell = cells[pos.index];
                    if (pos.type === 'head') {
                        cell.classList.add('plane-head');
                    } else if (pos.type === 'wing') {
                        cell.classList.add('plane-wing');
                    } else if (pos.type === 'body') {
                        cell.classList.add('plane-body');
                    } else if (pos.type === 'tail') {
                        cell.classList.add('plane-tail');
                    }
                });
            });
            
            // 显示敌方攻击
            GameState.enemyAttacks.forEach(index => {
                const cell = cells[index];
                let hit = false;
                let kill = false;
                
                GameState.playerPlanes.forEach(plane => {
                    if (plane.destroyed) {
                        plane.positions.forEach(pos => {
                            if (pos.index === index) kill = true;
                        });
                    } else {
                        plane.positions.forEach(pos => {
                            if (pos.index === index) hit = true;
                        });
                    }
                });
                
                if (kill) {
                    cell.classList.add('kill');
                } else if (hit) {
                    cell.classList.add('hit');
                } else {
                    cell.classList.add('miss');
                }
            });
        }
        
        // ========== 渲染敌方网格 ==========
        function renderEnemyGrid() {
            const grid = document.getElementById('enemyGrid');
            const cells = grid.querySelectorAll('.cell');
            
            GameState.playerAttacks.forEach(index => {
                const cell = cells[index];
                let hit = false;
                let kill = false;
                
                GameState.enemyPlanes.forEach(plane => {
                    if (plane.destroyed) {
                        plane.positions.forEach(pos => {
                            if (pos.index === index) {
                                kill = true;
                                if (pos.type === 'head') {
                                    cell.classList.add('plane-head');
                                } else if (pos.type === 'wing') {
                                    cell.classList.add('plane-wing');
                                } else if (pos.type === 'body') {
                                    cell.classList.add('plane-body');
                                } else if (pos.type === 'tail') {
                                    cell.classList.add('plane-tail');
                                }
                            }
                        });
                    } else {
                        plane.positions.forEach(pos => {
                            if (pos.index === index) hit = true;
                        });
                    }
                });
                
                if (kill) {
                    cell.classList.add('kill');
                } else if (hit) {
                    cell.classList.add('hit');
                } else {
                    cell.classList.add('miss');
                }
            });
        }
        
        // ========== 处理玩家点击敌方网格 ==========
        function handleEnemyGridClick(e) {
            if (GameState.phase !== 'battle') return;
            
            const index = parseInt(e.target.dataset.index);
            
            if (GameState.playerAttacks.has(index)) {
                addLog('已经攻击过该位置！', 'system');
                return;
            }
            
            GameState.playerAttacks.add(index);
            GameState.playerShots++;
            GameState.turn++;
            
            let result = checkHit(index, GameState.enemyPlanes);
            
            if (result.kill) {
                GameState.playerHits++;
                GameState.enemyDestroyed++;
                addLog(`击毁敌机！坐标: (${index % GameConfig.gridSize}, ${Math.floor(index / GameConfig.gridSize)})`, 'player');
                
                if (GameState.enemyDestroyed >= GameConfig.planeCount) {
                    endGame(true);
                    return;
                }
            } else if (result.hit) {
                GameState.playerHits++;
                addLog(`击中敌机机身！坐标: (${index % GameConfig.gridSize}, ${Math.floor(index / GameConfig.gridSize)})`, 'player');
            } else {
                addLog(`未击中。坐标: (${index % GameConfig.gridSize}, ${Math.floor(index / GameConfig.gridSize)})`, 'player');
            }
            
            renderEnemyGrid();
            updateStats();
            
            setTimeout(() => {
                makeAIMove();
            }, 800);
        }
        
        // ========== 检查命中 ==========
        function checkHit(index, planes) {
            let hit = false;
            let kill = false;
            
            for (const plane of planes) {
                for (const pos of plane.positions) {
                    if (pos.index === index) {
                        plane.hits.add(index);
                        hit = true;
                        
                        if (pos.type === 'head') {
                            plane.destroyed = true;
                            kill = true;
                        }
                        break;
                    }
                }
            }
            
            return {hit, kill};
        }
        
        // ========== AI 移动 ==========
        function makeAIMove() {
            let targetIndex;
            
            // 猎杀模式：如果有目标队列，优先攻击队列中的目标
            if (GameState.aiTargetQueue.length > 0) {
                targetIndex = GameState.aiTargetQueue.shift();
                
                // 确保目标未被攻击过
                while (GameState.enemyAttacks.has(targetIndex) && GameState.aiTargetQueue.length > 0) {
                    targetIndex = GameState.aiTargetQueue.shift();
                }
                
                if (GameState.enemyAttacks.has(targetIndex)) {
                    targetIndex = null;
                }
            }
            
            // 如果没有有效目标，随机选择
            if (targetIndex === null || targetIndex === undefined) {
                const available = [];
                for (let i = 0; i < GameConfig.gridSize * GameConfig.gridSize; i++) {
                    if (!GameState.enemyAttacks.has(i)) {
                        available.push(i);
                    }
                }
                
                if (available.length === 0) return;
                targetIndex = available[Math.floor(Math.random() * available.length)];
            }
            
            GameState.enemyAttacks.add(targetIndex);
            
            let result = checkHit(targetIndex, GameState.playerPlanes);
            const x = targetIndex % GameConfig.gridSize;
            const y = Math.floor(targetIndex / GameConfig.gridSize);
            
            if (result.kill) {
                GameState.playerDestroyed++;
                addLog(`AI 击毁了你的飞机！坐标: (${x}, ${y})`, 'ai');
                GameState.aiLastHit = null;
                GameState.aiTargetQueue = [];
                
                if (GameState.playerDestroyed >= GameConfig.planeCount) {
                    endGame(false);
                    return;
                }
            } else if (result.hit) {
                addLog(`AI 击中了你的飞机机身！坐标: (${x}, ${y})`, 'ai');
                GameState.aiLastHit = {x, y, index: targetIndex};
                
                // 添加周围的格子到目标队列
                const adjacent = [
                    {dx: 0, dy: -1}, {dx: 1, dy: 0},
                    {dx: 0, dy: 1}, {dx: -1, dy: 0}
                ];
                
                adjacent.forEach(({dx, dy}) => {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx >= 0 && nx < GameConfig.gridSize && ny >= 0 && ny < GameConfig.gridSize) {
                        const nIndex = ny * GameConfig.gridSize + nx;
                        if (!GameState.enemyAttacks.has(nIndex) && !GameState.aiTargetQueue.includes(nIndex)) {
                            GameState.aiTargetQueue.push(nIndex);
                        }
                    }
                });
            } else {
                addLog(`AI 未击中。坐标: (${x}, ${y})`, 'ai');
            }
            
            renderPlayerPlanes();
            updateStats();
        }
        
        // ========== 更新统计 ==========
        function updateStats() {
            document.getElementById('playerPlanes').textContent = GameConfig.planeCount - GameState.playerDestroyed;
            document.getElementById('enemyPlanes').textContent = GameConfig.planeCount - GameState.enemyDestroyed;
            document.getElementById('turnCount').textContent = GameState.turn;
            
            const accuracy = GameState.playerShots > 0 
                ? Math.round((GameState.playerHits / GameState.playerShots) * 100)
                : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        // ========== 添加日志 ==========
        function addLog(message, type = 'system') {
            const log = document.getElementById('gameLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const time = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
            entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        // ========== 结束游戏 ==========
        function endGame(playerWon) {
            GameState.phase = 'gameover';
            const modal = document.getElementById('gameOverModal');
            const text = document.getElementById('gameOverText');
            
            if (playerWon) {
                modal.className = 'game-over victory show';
                text.textContent = '⬡ 任务完成 - VICTORY ⬡';
                addLog('全部敌机已被击毁！任务成功！', 'system');
            } else {
                modal.className = 'game-over defeat show';
                text.textContent = '✕ 任务失败 - DEFEAT ✕';
                addLog('我方飞机全部坠毁。任务失败。', 'system');
            }
        }
        
        // ========== 按钮事件 ==========
        document.getElementById('manualBtn').addEventListener('click', () => {
            GameState.manualDeployMode = true;
            GameState.playerPlanes = [];
            GameState.placedCount = 0;
            GameState.currentDirection = 0;
            
            document.getElementById('playerGrid').classList.add('manual-mode');
            document.getElementById('manualControls').style.display = 'block';
            document.getElementById('deployBtn').disabled = true;
            document.getElementById('startBtn').disabled = true;
            
            // 激活第一个方向按钮
            document.querySelectorAll('.direction-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === 0);
            });
            
            renderPlayerPlanes();
            updatePlacedCount();
            addLog('━━━━━━━━━━━━━━━━━━━━━', 'system');
            addLog('手动部署模式已启动', 'system');
            addLog('• 选择方向按钮（↑→↓←）', 'system');
            addLog('• 鼠标悬停预览，点击放置', 'system');
            addLog('• 点击已放置的飞机可删除', 'system');
            addLog('━━━━━━━━━━━━━━━━━━━━━', 'system');
        });
        
        document.getElementById('deployBtn').addEventListener('click', () => {
            GameState.manualDeployMode = false;
            GameState.playerPlanes = deployPlanes(true);
            GameState.placedCount = GameConfig.planeCount;
            
            document.getElementById('playerGrid').classList.remove('manual-mode');
            document.getElementById('manualControls').style.display = 'none';
            document.getElementById('manualBtn').disabled = true;
            
            renderPlayerPlanes();
            document.getElementById('startBtn').disabled = false;
            addLog('我方飞机随机部署完成！', 'system');
        });
        
        // 方向选择按钮
        document.querySelectorAll('.direction-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const dir = parseInt(btn.dataset.dir);
                GameState.currentDirection = dir;
                
                document.querySelectorAll('.direction-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                const dirNames = ['上', '右', '下', '左'];
                addLog(`切换方向：机头朝${dirNames[dir]}`, 'system');
            });
        });
        
        // 清空按钮
        document.getElementById('clearBtn').addEventListener('click', () => {
            GameState.playerPlanes = [];
            GameState.placedCount = 0;
            renderPlayerPlanes();
            updatePlacedCount();
            document.getElementById('startBtn').disabled = true;
            addLog('清空所有已放置的飞机', 'system');
        });
        
        document.getElementById('startBtn').addEventListener('click', () => {
            GameState.enemyPlanes = deployPlanes(false);
            GameState.phase = 'battle';
            GameState.manualDeployMode = false;
            
            document.getElementById('playerGrid').classList.remove('manual-mode');
            document.getElementById('deployBtn').disabled = true;
            document.getElementById('manualBtn').disabled = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('manualControls').style.display = 'none';
            
            addLog('战斗开始！祝你好运，指挥官！', 'system');
            updateStats();
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });
        
        // ========== 初始化 ==========
        initGrids();
        addLog('系统初始化完成。选择"手动布阵"或"随机布阵"开始部署飞机。', 'system');
    </script>
</body>
</html>
